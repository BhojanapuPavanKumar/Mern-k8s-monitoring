name: MERN K8s CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FRONTEND_IMAGE: mern-frontend
  BACKEND_IMAGE:  mern-backend

jobs:

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Build & Docker
    runs-on: ubuntu-latest
    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: cd frontend && npm ci

    - name: Build React app
      run: cd frontend && npm run build

    - name: Docker Build (verify image builds cleanly)
      run: docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ./frontend

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint, Test & Docker
    runs-on: ubuntu-latest
    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      run: cd backend && npm ci

    - name: Run tests
      run: cd backend && npm test
      # If you have no tests yet, add this to backend/package.json:
      # "test": "echo \"No tests yet\" && exit 0"

    - name: Docker Build (verify image builds cleanly)
      run: docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ./backend

  # ── Validate K8s Manifests ────────────────────────────────────────────────
  k8s-lint:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Dry-run validate all manifests
      run: |
        kubectl apply --dry-run=client -f k8s/mongodb/
        kubectl apply --dry-run=client -f k8s/backend/
        kubectl apply --dry-run=client -f k8s/frontend/
        kubectl apply --dry-run=client -f k8s/ingress/
      # NOTE: CRD-based files (ServiceMonitor, PrometheusRule, AlertmanagerConfig)
      # need the CRDs installed to validate — skip them here, they are validated
      # when applied to the cluster in deploy.sh

  # ── Summary gate — both must pass before deploy ───────────────────────────
  all-checks:
    name: All checks passed
    needs: [frontend, backend, k8s-lint]
    runs-on: ubuntu-latest
    steps:
    - run: echo "✅ All jobs passed — safe to deploy"