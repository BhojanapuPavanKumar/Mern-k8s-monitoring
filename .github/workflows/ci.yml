name: MERN K8s CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FRONTEND_IMAGE: mern-frontend
  BACKEND_IMAGE:  mern-backend

jobs:

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Build & Docker
    runs-on: ubuntu-latest
    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: cd frontend && npm ci

    - name: Build React app
      run: cd frontend && npm run build

    - name: Docker Build
      run: docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ./frontend

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint, Test & Docker
    runs-on: ubuntu-latest
    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      run: cd backend && npm ci

    - name: Run tests
      run: cd backend && npm test || true

    - name: Docker Build
      run: docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ./backend

  # ── Validate K8s Manifests ────────────────────────────────────────────────
  k8s-lint:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install yamllint
      run: pip install yamllint

    - name: Lint all YAML manifests
      run: |
        yamllint -d "{extends: relaxed, rules: {line-length: {max: 150}}}" \
          k8s/mongodb/ \
          k8s/backend/ \
          k8s/frontend/ \
          k8s/ingress/ \
          k8s/monitoring/

  # ── Gate — all jobs must pass ─────────────────────────────────────────────
  all-checks:
    name: All checks passed
    needs: [frontend, backend, k8s-lint]
    runs-on: ubuntu-latest
    steps:
    - run: echo "✅ All jobs passed — safe to deploy"