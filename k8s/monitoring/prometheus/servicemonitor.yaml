apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: monitoring
  labels:
    release: prometheus-stack

spec:
  namespaceSelector:
    matchNames:
    - mern-app

  selector:
    matchLabels:
      app: backend

  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s