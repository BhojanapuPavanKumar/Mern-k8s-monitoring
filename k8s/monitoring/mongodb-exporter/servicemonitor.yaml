apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mongodb-exporter-monitor
  namespace: monitoring
  labels:
    release: prometheus-stack

spec:
  selector:
    matchLabels:
      app: mongodb-exporter

  namespaceSelector:
    matchNames:
    - monitoring

  endpoints:
  - port: metrics
    interval: 15s